<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOURA | Nähren</title>

    <link rel="icon" href="images/n-logo.svg" type="image/svg+xml">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Alpine.js Plugins -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js Core -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        window.addEventListener('alpine:init', () => {
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            sage: '#8ba88e',
                            sand: '#fdfaf7',
                            terracotta: '#a68b7c',
                            charcoal: '#2d3748'
                        },
                        fontFamily: {
                            serif: ['Playfair Display', 'serif'],
                            sans: ['Inter', 'sans-serif'],
                        }
                    }
                }
            }
        });
    </script>
</head>
<body x-data="nouraApp()" 
      x-init="if(state.hasAccess && !state.isCoaching) window.location.href='index.html'; initProtocol()"
      @scroll.window="scroll = window.pageYOffset" class="bg-sand text-charcoal overflow-x-hidden">

    <!-- Global Background Glow -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden no-print">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-sage/5 w-[1000px] h-[1000px] rounded-full blur-[120px]"></div>
    </div>

    <!-- Header -->
    <header class="relative z-10 max-w-4xl mx-auto px-6 pt-16 md:pt-24 flex justify-between items-start no-print">
        <div class="text-left">
            <p class="label-caps mb-4">PROTOKOLL</p>
            <h1 class="h1-serif italic text-charcoal !mb-2">Nähren</h1>
            <p class="text-[10px] uppercase tracking-[0.15em] font-bold text-sage/60">
                Was nährt dich heute wirklich?
            </p>
        </div>
        <a href="index.html">
            <img src="images/logo noura dwhite bg.svg" alt="NOURA" class="w-12 md:w-16 opacity-60">
        </a>
    </header>

    <main class="relative z-10 max-w-4xl mx-auto px-6 mt-12 pb-40">
        
        <div class="space-y-8">
            
            <!-- Mahlzeiten Loop -->
            <template x-for="meal in [
                { id: 'breakfast', label: 'Frühstück', icon: 'coffee' },
                { id: 'lunch', label: 'Mittagessen', icon: 'sun' },
                { id: 'dinner', label: 'Abendessen', icon: 'moon' },
                { id: 'snacks', label: 'Snacks & Extras', icon: 'apple' }
            ]" :key="meal.id">
                <section class="noura-card noura-glow bg-white/60 border-sage/5 !p-8">
                    <div class="flex items-center gap-6 mb-8">
                        <div class="w-12 h-12 bg-sage/5 rounded-2xl flex items-center justify-center text-sage/40">
                            <i :data-lucide="meal.icon" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <span class="label-caps !mb-0" x-text="meal.label"></span>
                            <h2 class="h2-serif !text-xl !mb-0 italic">Deine Wahl</h2>
                        </div>
                    </div>
                    
                    <div class="space-y-8">
                        <div class="group">
                            <label class="label-caps mb-2 opacity-40">Was gab es zu essen?</label>
                            <textarea x-model="todayProtocol[meal.id].food" 
                                      x-init="resizeJournal($el)" @input="resizeJournal($el)"
                                      class="journal-textarea !text-lg !mt-0 !line-height-[1.6rem]" placeholder="Nenne deine Proteinquelle..."></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-sage/5">
                            <div>
                                <div class="flex justify-between items-end mb-4">
                                    <label class="label-caps !text-[8px] opacity-40">Sättigung</label>
                                    <span class="text-[10px] font-bold text-sage/60" x-text="todayProtocol[meal.id].satiety + '/10'"></span>
                                </div>
                                <input type="range" min="1" max="10" x-model="todayProtocol[meal.id].satiety" class="w-full accent-sage opacity-60">
                                <div class="flex justify-between mt-2 text-[7px] uppercase tracking-widest opacity-30 font-bold">
                                    <span>Hungrig</span>
                                    <span>Zufrieden</span>
                                    <span>Voll</span>
                                </div>
                            </div>
                            <div class="group">
                                <label class="label-caps mb-2 opacity-40">Gefühl danach</label>
                                <input type="text" x-model="todayProtocol[meal.id].mood" 
                                       class="w-full bg-transparent border-b border-sage/10 focus:border-sage py-2 text-base font-serif italic text-charcoal/70 outline-none" 
                                       placeholder="Zufrieden, Müde, Energie?">
                            </div>
                        </div>
                    </div>
                </section>
            </template>

            <!-- Tages-Reflexion -->
            <section class="noura-card noura-glow bg-sage/5 border-sage/20 relative overflow-hidden !p-8">
                <div class="flex items-center gap-6 mb-8">
                    <div class="w-12 h-12 bg-sage/10 rounded-2xl flex items-center justify-center text-sage">
                        <i data-lucide="sparkles" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <span class="label-caps !text-sage !mb-0">Lichtblick</span>
                        <h2 class="h2-serif !text-xl !mb-0 italic">Tages-Reflexion</h2>
                    </div>
                </div>
                
                <div>
                    <label class="label-caps mb-2 opacity-40">Dein wichtigster Genuss-Moment?</label>
                    <textarea x-model="todayProtocol.reflection" 
                              x-init="resizeJournal($el)" @input="resizeJournal($el)"
                              class="journal-textarea !text-lg !mt-0 !line-height-[1.6rem]" placeholder="Was hast du heute wirklich geschmeckt?"></textarea>
                </div>
            </section>

        </div>

    </main>

    <!-- Floating Navigation -->
    <nav class="noura-nav no-print">
        <a href="index.html" class="noura-nav-item">
            <i data-lucide="layout-grid"></i>
            <span class="noura-nav-label">Übersicht</span>
        </a>
        <a href="naehren.html" class="noura-nav-item active">
            <i data-lucide="utensils"></i>
            <span class="noura-nav-label">Nähren</span>
        </a>
        <a href="reset.html" class="noura-nav-item">
            <i data-lucide="milestone"></i>
            <span class="noura-nav-label">Wegweiser</span>
        </a>
    </nav>

    <!-- Global Save Toast -->
    <div x-show="saved"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="fixed bottom-24 right-8 z-[150] bg-charcoal text-white text-[10px] font-bold uppercase tracking-[0.2em] px-4 py-2 rounded-full shadow-lg flex items-center gap-2"
         x-cloak>
        <i data-lucide="check-circle" class="w-3.5 h-3.5"></i>
        <span>Gesichert</span>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            $nextTick(() => lucide.createIcons());
        });
    </script>
</body>
</html>
